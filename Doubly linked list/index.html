<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags and title -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doubly Linked List Animation</title>
  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="info.html">
</head>
<body>
  <hr>
  <!-- Heading -->
  <div class="head"><h1>Doubly Linked List!!</h1></div>
  <hr>
  <!-- List container and controls --> 
  <div class="listing">
    <div id="list-container" class="list-container">
      <div id="list" class="list"></div>
    </div>
    
    <!-- Input field and buttons for adding, removing, and searching nodes -->
    <input type="text" id="input-value" class="input-size"  placeholder="Enter a value">
    <button onclick="addNode()" class="button-87" class="input-size">Add Node</button>
    <button onclick="removeNode()" class="button-87" class="input-size">Remove Node</button><br><br>
    <!-- Input fields and button for inserting and updating nodes -->
    <input type="text" id="insert-value" class="input-size" placeholder="Value to insert">
    <input type="number" id="insert-position" class="input-size" placeholder="Position">
    <button onclick="insertNode()" class="button-87" class="input-size">Insert</button><br><br>
    <input type="number" id="update-position" class="input-size" placeholder="Position">
    <input type="text" id="update-value" class="input-size" placeholder="New value">
    <button onclick="updateNode()" class="button-87" class="input-size">Update Node</button>
  </div>
  <span class="info">
   <button class="button-87" onclick="location.href='info.html'">Click to get Information </button>
  </span>
  <div class="footer"><hr class="y">
  <!-- Footer -->
  <footer>
    <h2> PRESENTED BY:
      YASHVI KATARMAL ,
    AYUSH TRILOKCHANDANI ,
    DEEPAK TILOKANI ,
    RAJ SAMVANI ...
    </h2>
  </footer>
  <hr>
  </div>
  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
